

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atonix-backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=finance_api.settings
      - PYTHONUNBUFFERED=1
      - BANKING_TOKEN_ENCRYPTION_KEY=${BANKING_TOKEN_ENCRYPTION_KEY:-local-dev-banking-key-change-me}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID:-}
      - PLAID_CLIENT_SECRET=${PLAID_CLIENT_SECRET:-}
      - PLAID_OAUTH_AUTHORIZE_URL=${PLAID_OAUTH_AUTHORIZE_URL:-}
      - YODLEE_CLIENT_ID=${YODLEE_CLIENT_ID:-}
      - YODLEE_CLIENT_SECRET=${YODLEE_CLIENT_SECRET:-}
      - YODLEE_OAUTH_AUTHORIZE_URL=${YODLEE_OAUTH_AUTHORIZE_URL:-}
      - FINICITY_CLIENT_ID=${FINICITY_CLIENT_ID:-}
      - FINICITY_CLIENT_SECRET=${FINICITY_CLIENT_SECRET:-}
      - FINICITY_OAUTH_AUTHORIZE_URL=${FINICITY_OAUTH_AUTHORIZE_URL:-}
    depends_on: []

  banking-sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atonix-banking-sync
    command: >
      /bin/sh -c "while true; do
      python manage.py sync_banking_integrations;
      sleep ${BANKING_SYNC_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=finance_api.settings
      - PYTHONUNBUFFERED=1
      - BANKING_SYNC_INTERVAL_SECONDS=${BANKING_SYNC_INTERVAL_SECONDS:-86400}
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atonix-frontend
    command: npm start
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  db:
    image: dhi.io/postgres:14-alpine3.22
    container_name: atonix-db
    environment:
      - POSTGRES_DB=atonix
      - POSTGRES_USER=atonix
      - POSTGRES_PASSWORD=atonixpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
