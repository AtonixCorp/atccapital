image: python:3.10-slim

pipelines:
  default:
    - step:
        name: Backend tests
        caches:
          - pip
        script:
          - cd backend
          - python -m venv .venv
          - source .venv/bin/activate
          - pip install --upgrade pip
          - pip install -r requirements.txt
          - python manage.py test
    - step:
        name: Frontend build
        image: node:20-alpine
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build

definitions:
  caches:
    pip: ~/.cache/pip
    node: ~/.npm
